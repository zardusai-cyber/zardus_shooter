<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zardus Shooter - Ghibli Edition 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --accent-pink: #ff6b9d;
            --accent-cyan: #4ecdc4;
            --accent-gold: #ffd93d;
            --accent-purple: #c44569;
            --text-light: #f8f8f2;
            --glow-pink: rgba(255, 107, 157, 0.6);
            --glow-cyan: rgba(78, 205, 196, 0.6);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-light);
        }

        #gameContainer {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 60px var(--glow-pink),
                0 0 100px var(--glow-cyan),
                inset 0 0 60px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.1);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, 
                #0f0f23 0%, 
                #1a1a3e 30%,
                #2d1b4e 60%,
                #1a1a2e 100%);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 120px;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-value.lives {
            color: var(--accent-pink);
            -webkit-text-fill-color: var(--accent-pink);
        }

        .stat-value.score {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 30, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .hidden {
            display: none !important;
        }

        .title {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px var(--glow-pink);
            margin-bottom: 10px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.7;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        .zardus-intro {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .btn {
            padding: 18px 50px;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
            box-shadow: 0 10px 40px var(--glow-pink);
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px var(--glow-pink);
        }

        .instructions {
            margin-top: 40px;
            text-align: center;
            opacity: 0.6;
            font-size: 14px;
            line-height: 2;
        }

        .instructions kbd {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 8px;
            margin: 0 5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .final-score {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }

        .high-score {
            font-size: 20px;
            color: var(--accent-cyan);
            margin-bottom: 30px;
        }

        .new-record {
            color: var(--accent-gold);
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #mobileControls {
                display: flex;
            }
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .mobile-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }

        .shoot-zone {
            width: 120px;
            height: 120px;
            background: rgba(255, 107, 157, 0.3);
            border-color: var(--accent-pink);
        }

        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-pink);
            border-radius: 50%;
            opacity: 0.3;
            animation: particleFloat 15s linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .powerup-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-gold);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .powerup-indicator.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="particles-bg" id="particles"></div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="700"></canvas>
        
        <div id="ui">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value score" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Lives</div>
                <div class="stat-value lives" id="livesDisplay">❤️❤️❤️</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Wave</div>
                <div class="stat-value" id="waveDisplay">1</div>
            </div>
        </div>

        <div id="powerupIndicator" class="powerup-indicator"></div>

        <div id="startScreen">
            <svg class="zardus-intro" viewBox="0 0 200 200">
                <!-- Baby Zardoz - Ghibli Style -->
                <defs>
                    <radialGradient id="bodyGrad" cx="50%" cy="30%" r="70%">
                        <stop offset="0%" style="stop-color:#b8e6ff"/>
                        <stop offset="100%" style="stop-color:#7ec8e3"/>
                    </radialGradient>
                    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#ffb3ba;stop-opacity:0"/>
                    </radialGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- Body -->
                <ellipse cx="100" cy="130" rx="55" ry="60" fill="url(#bodyGrad)" filter="url(#glow)"/>
                
                <!-- Belly -->
                <ellipse cx="100" cy="145" rx="35" ry="35" fill="#d4f1ff" opacity="0.6"/>
                
                <!-- Head -->
                <circle cx="100" cy="75" r="50" fill="url(#bodyGrad)" filter="url(#glow)"/>
                
                <!-- Hair/Tuft -->
                <path d="M75 35 Q85 15 100 25 Q115 15 125 35" stroke="#5eb8d4" stroke-width="8" fill="none" stroke-linecap="round"/>
                <circle cx="85" cy="28" r="8" fill="#5eb8d4"/>
                <circle cx="100" cy="20" r="10" fill="#5eb8d4"/>
                <circle cx="115" cy="28" r="8" fill="#5eb8d4"/>
                
                <!-- Eyes -->
                <ellipse cx="80" cy="70" rx="12" ry="14" fill="#2d3436"/>
                <ellipse cx="120" cy="70" rx="12" ry="14" fill="#2d3436"/>
                <circle cx="84" cy="66" r="5" fill="white"/>
                <circle cx="124" cy="66" r="5" fill="white"/>
                <circle cx="80" cy="72" r="2" fill="white" opacity="0.5"/>
                <circle cx="120" cy="72" r="2" fill="white" opacity="0.5"/>
                
                <!-- Cute blush -->
                <ellipse cx="65" cy="82" rx="12" ry="8" fill="url(#cheekGrad)"/>
                <ellipse cx="135" cy="82" rx="12" ry="8" fill="url(#cheekGrad)"/>
                
                <!-- Smile -->
                <path d="M85 90 Q100 105 115 90" stroke="#2d3436" stroke-width="4" fill="none" stroke-linecap="round"/>
                
                <!-- Wings (small angel wings) -->
                <ellipse cx="40" cy="110" rx="25" ry="35" fill="rgba(255,255,255,0.4)" transform="rotate(-20 40 110)"/>
                <ellipse cx="160" cy="110" rx="25" ry="35" fill="rgba(255,255,255,0.4)" transform="rotate(20 160 110)"/>
                
                <!-- Arms -->
                <ellipse cx="50" cy="140" rx="15" ry="20" fill="url(#bodyGrad)" transform="rotate(-30 50 140)"/>
                <ellipse cx="150" cy="140" rx="15" ry="20" fill="url(#bodyGrad)" transform="rotate(30 150 140)"/>
                
                <!-- Feet -->
                <ellipse cx="75" cy="185" rx="20" ry="12" fill="url(#bodyGrad)"/>
                <ellipse cx="125" cy="185" rx="20" ry="12" fill="url(#bodyGrad)"/>
            </svg>
            
            <div class="title">ZARDUS SHOOTER</div>
            <div class="subtitle">Ghibli Edition 🌸</div>
            
            <button class="btn btn-primary" id="startBtn">START GAME</button>
            
            <div class="instructions">
                <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> to move<br>
                <kbd>SPACE</kbd> or <kbd>CLICK</kbd> to shoot<br>
                <kbd>P</kbd> to pause
            </div>
        </div>

        <div id="gameOverScreen" class="hidden">
            <div class="title">GAME OVER</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="high-score" id="highScoreText">Best: 0</div>
            <button class="btn btn-primary" id="restartBtn">PLAY AGAIN</button>
        </div>

        <div id="mobileControls">
            <div class="mobile-btn" id="moveLeft">◀</div>
            <div class="mobile-btn shoot-zone" id="shootBtn">✦</div>
            <div class="mobile-btn" id="moveRight">▶</div>
        </div>
    </div>

    <script>
        // ==================== GAME ENGINE ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State
        let gameState = {
            running: false,
            paused: false,
            score: 0,
            lives: 3,
            wave: 1,
            highScore: parseInt(localStorage.getItem('zardusHighScore')) || 0,
            lastTime: 0,
            deltaTime: 0
        };

        // Input State
        const keys = {};
        let mouseDown = false;

        // ==================== AUDIO ENGINE ====================
        const AudioEngine = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                const now = this.ctx.currentTime;
                
                switch(type) {
                    case 'shoot':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(800, now);
                        osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                    case 'hit':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        osc.start(now);
                        osc.stop(now + 0.15);
                        break;
                    case 'powerup':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                        osc.start(now);
                        osc.stop(now + 0.4);
                        break;
                    case 'damage':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                        break;
                    case 'explosion':
                        const noise = this.ctx.createBufferSource();
                        const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.3, this.ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < buffer.length; i++) {
                            data[i] = Math.random() * 2 - 1;
                        }
                        noise.buffer = buffer;
                        const noiseGain = this.ctx.createGain();
                        noise.connect(noiseGain);
                        noiseGain.connect(this.ctx.destination);
                        noiseGain.gain.setValueAtTime(0.2, now);
                        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        noise.start(now);
                        return;
                }
            }
        };

        // ==================== PARTICLES ====================
        class Particle {
            constructor(x, y, color, size, speedX, speedY, life, type = 'circle') {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = size;
                this.speedX = speedX;
                this.speedY = speedY;
                this.life = life;
                this.maxLife = life;
                this.type = type;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update(dt) {
                this.x += this.speedX * dt;
                this.y += this.speedY * dt;
                this.speedY += 100 * dt; // gravity
                this.life -= dt;
                this.rotation += this.rotationSpeed;
                this.size *= 0.98;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = alpha;
                
                if (this.type === 'star') {
                    this.drawStar(ctx, 0, 0, 5, this.size, this.size / 2);
                } else {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }

            drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx;
                let y = cy;
                const step = Math.PI / spikes;

                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius;
                    y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;

                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }
                ctx.lineTo(cx, cy - outerRadius);
                ctx.closePath();
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        let particles = [];

        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 100 + Math.random() * 200;
                const type = Math.random() > 0.5 ? 'star' : 'circle';
                particles.push(new Particle(
                    x, y, color,
                    3 + Math.random() * 5,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    0.5 + Math.random() * 0.5,
                    type
                ));
            }
        }

        // ==================== ZARDUS (Player) ====================
        class Zardus {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 80;
                this.width = 60;
                this.height = 70;
                this.speed = 400;
                this.shootCooldown = 0;
                this.shootRate = 0.15;
                this.invincible = 0;
                this.powerLevel = 0;
                this.powerTimer = 0;
                this.wingAngle = 0;
                this.bobOffset = 0;
            }

            update(dt) {
                // Movement
                if (keys['ArrowLeft'] || keys['KeyA']) {
                    this.x -= this.speed * dt;
                }
                if (keys['ArrowRight'] || keys['KeyD']) {
                    this.x += this.speed * dt;
                }

                // Bounds
                this.x = Math.max(this.width / 2, Math.min(canvas.width - this.width / 2, this.x));

                // Shooting
                this.shootCooldown -= dt;
                if ((keys['Space'] || mouseDown) && this.shootCooldown <= 0) {
                    this.shoot();
                    this.shootCooldown = this.shootRate;
                }

                // Invincibility
                if (this.invincible > 0) this.invincible -= dt;

                // Power-up
                if (this.powerTimer > 0) {
                    this.powerTimer -= dt;
                    if (this.powerTimer <= 0) {
                        this.powerLevel = 0;
                        document.getElementById('powerupIndicator').classList.remove('active');
                    }
                }

                // Animation
                this.wingAngle += dt * 3;
                this.bobOffset = Math.sin(Date.now() / 200) * 3;
            }

            shoot() {
                AudioEngine.play('shoot');
                
                if (this.powerLevel === 0) {
                    bullets.push(new Bullet(this.x, this.y - 30, 0, -600));
                } else if (this.powerLevel === 1) {
                    bullets.push(new Bullet(this.x - 15, this.y - 20, -50, -600));
                    bullets.push(new Bullet(this.x + 15, this.y - 20, 50, -600));
                } else {
                    bullets.push(new Bullet(this.x, this.y - 30, 0, -700));
                    bullets.push(new Bullet(this.x - 20, this.y - 15, -80, -650));
                    bullets.push(new Bullet(this.x + 20, this.y - 15, 80, -650));
                }

                // Muzzle flash particles
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(
                        this.x + (Math.random() - 0.5) * 20,
                        this.y - 35,
                        '#ffff88',
                        2 + Math.random() * 2,
                        (Math.random() - 0.5) * 100,
                        -200 - Math.random() * 100,
                        0.2
                    ));
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y + this.bobOffset);
                
                // Invincibility flash
                if (this.invincible > 0 && Math.floor(this.invincible * 10) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                // Wings (animated)
                const wingFlap = Math.sin(this.wingAngle) * 0.2;
                ctx.save();
                ctx.translate(-35, 0);
                ctx.rotate(-0.3 + wingFlap);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.ellipse(0, 0, 20, 30, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.translate(35, 0);
                ctx.rotate(0.3 - wingFlap);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.ellipse(0, 0, 20, 30, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Body gradient
                const bodyGrad = ctx.createRadialGradient(0, -10, 0, 0, 0, 40);
                bodyGrad.addColorStop(0, '#b8e6ff');
                bodyGrad.addColorStop(1, '#7ec8e3');
                
                // Body
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.ellipse(0, 10, 30, 35, 0, 0, Math.PI * 2);
                ctx.fill();

                // Head
                ctx.beginPath();
                ctx.arc(0, -20, 28, 0, Math.PI * 2);
                ctx.fill();

                // Hair tuft
                ctx.fillStyle = '#5eb8d4';
                ctx.beginPath();
                ctx.arc(-12, -45, 6, 0, Math.PI * 2);
                ctx.arc(0, -50, 8, 0, Math.PI * 2);
                ctx.arc(12, -45, 6, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#2d3436';
                ctx.beginPath();
                ctx.ellipse(-10, -22, 7, 9, 0, 0, Math.PI * 2);
                ctx.ellipse(10, -22, 7, 9, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eye highlights
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-8, -25, 3, 0, Math.PI * 2);
                ctx.arc(12, -25, 3, 0, Math.PI * 2);
                ctx.fill();

                // Blush
                ctx.fillStyle = 'rgba(255, 179, 186, 0.6)';
                ctx.beginPath();
                ctx.ellipse(-20, -12, 8, 5, 0, 0, Math.PI * 2);
                ctx.ellipse(20, -12, 8, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Smile
                ctx.strokeStyle = '#2d3436';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, -15, 10, 0.2, Math.PI - 0.2);
                ctx.stroke();

                // Power glow
                if (this.powerTimer > 0) {
                    ctx.shadowColor = '#ffd93d';
                    ctx.shadowBlur = 30;
                    ctx.strokeStyle = '#ffd93d';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 45, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            }

            hit() {
                if (this.invincible > 0) return;
                
                this.invincible = 2;
                this.lives--;
                AudioEngine.play('damage');
                createExplosion(this.x, this.y, '#ff6b9d', 30);
                updateUI();
                
                if (this.lives <= 0) {
                    gameOver();
                }
            }
        }

        // ==================== BULLETS ====================
        class Bullet {
            constructor(x, y, speedX, speedY) {
                this.x = x;
                this.y = y;
                this.speedX = speedX;
                this.speedY = speedY;
                this.radius = 6;
                this.trail = [];
            }

            update(dt) {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 5) this.trail.shift();

                this.x += this.speedX * dt;
                this.y += this.speedY * dt;
            }

            draw(ctx) {
                // Trail
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length * 0.5;
                    const size = this.radius * (i / this.trail.length);
                    ctx.fillStyle = `rgba(255, 217, 61, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Bullet
                ctx.fillStyle = '#ffd93d';
                ctx.shadowColor = '#ffd93d';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            isOffscreen() {
                return this.y < -10 || this.y > canvas.height + 10 ||
                       this.x < -10 || this.x > canvas.width + 10;
            }
        }

        let bullets = [];

        // ==================== ENEMIES ====================
        class Enemy {
            constructor(type = 'basic') {
                this.type = type;
                this.x = 50 + Math.random() * (canvas.width - 100);
                this.y = -50;
                this.radius = type === 'big' ? 40 : 25;
                this.speed = type === 'big' ? 80 : 120 + gameState.wave * 10;
                this.health = type === 'big' ? 5 : 1;
                this.wobble = Math.random() * Math.PI * 2;
                this.rotation = 0;
            }

            update(dt) {
                this.y += this.speed * dt;
                this.wobble += dt * 2;
                this.x += Math.sin(this.wobble) * 50 * dt;
                this.rotation += dt * 2;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                if (this.type === 'big') {
                    // Big enemy - dark cloud-like
                    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 40);
                    grad.addColorStop(0, '#636e72');
                    grad.addColorStop(1, '#2d3436');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, 40, 0, Math.PI * 2);
                    ctx.fill();

                    // Angry eyes
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(-12, -5, 8, 0, Math.PI * 2);
                    ctx.arc(12, -5, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(-12, -5, 4, 0, Math.PI * 2);
                    ctx.arc(12, -5, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Basic enemy - pink puffball
                    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
                    grad.addColorStop(0, '#ff9ff3');
                    grad.addColorStop(1, '#ff6b9d');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, 25, 0, Math.PI * 2);
                    ctx.fill();

                    // Eyes
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(-8, -5, 8, 0, Math.PI * 2);
                    ctx.arc(8, -5, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#2d3436';
                    ctx.beginPath();
                    ctx.arc(-6, -4, 4, 0, Math.PI * 2);
                    ctx.arc(10, -4, 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            isOffscreen() {
                return this.y > canvas.height + 50;
            }
        }

        let enemies = [];
        let enemySpawnTimer = 0;
        let enemiesSpawned = 0;
        let enemiesPerWave = 10;

        // ==================== POWER-UPS ====================
        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.speed = 100;
                this.type = 'spread';
                this.rotation = 0;
            }

            update(dt) {
                this.y += this.speed * dt;
                this.rotation += dt * 5;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Glow
                ctx.shadowColor = '#ffd93d';
                ctx.shadowBlur = 20;

                // Star shape
                ctx.fillStyle = '#ffd93d';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2 / 5) - Math.PI / 2;
                    const inner = (i % 2 === 0) ? 15 : 7;
                    const outer = 15;
                    if (i === 0) {
                        ctx.moveTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
                    } else {
                        ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
                    }
                    const innerAngle = angle + Math.PI / 5;
                    ctx.lineTo(Math.cos(innerAngle) * inner, Math.sin(innerAngle) * inner);
                }
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();
            }

            isOffscreen() {
                return this.y > canvas.height + 20;
            }
        }

        let powerUps = [];

        // ==================== BACKGROUND ====================
        function drawBackground() {
            // Stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % canvas.width;
                const y = (i * 251) % (canvas.height * 0.6);
                const size = 1 + (i % 3);
                const twinkle = Math.sin(Date.now() / 500 + i) * 0.5 + 0.5;
                ctx.globalAlpha = twinkle * 0.5;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Gradient overlay
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, 'rgba(15, 15, 35, 0.3)');
            grad.addColorStop(1, 'rgba(26, 26, 46, 0.5)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ==================== GAME LOGIC ====================
        let player;

        function startGame() {
            player = new Zardus();
            gameState = {
                running: true,
                paused: false,
                score: 0,
                lives: 3,
                wave: 1,
                highScore: parseInt(localStorage.getItem('zardusHighScore')) || 0,
                lastTime: performance.now(),
                deltaTime: 0
            };
            bullets = [];
            enemies = [];
            powerUps = [];
            particles = [];
            enemiesSpawned = 0;
            enemySpawnTimer = 0;
            enemiesPerWave = 10;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameState.running = false;
            
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('zardusHighScore', gameState.highScore);
                document.getElementById('highScoreText').innerHTML = 
                    `<span class="new-record">✨ NEW RECORD! ✨</span>`;
            } else {
                document.getElementById('highScoreText').textContent = `Best: ${gameState.highScore}`;
            }
            
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('scoreDisplay').textContent = gameState.score;
            document.getElementById('livesDisplay').textContent = '❤️'.repeat(gameState.lives);
            document.getElementById('waveDisplay').textContent = gameState.wave;
        }

        function spawnEnemy() {
            const type = Math.random() > 0.8 ? 'big' : 'basic';
            enemies.push(new Enemy(type));
            enemiesSpawned++;

            if (enemiesSpawned >= enemiesPerWave) {
                gameState.wave++;
                enemiesPerWave = 10 + gameState.wave * 3;
                enemiesSpawned = 0;
                updateUI();
            }
        }

        function checkCollisions() {
            // Bullets vs Enemies
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const dx = bullets[i].x - enemies[j].x;
                    const dy = bullets[i].y - enemies[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < bullets[i].radius + enemies[j].radius) {
                        enemies[j].health--;
                        bullets.splice(i, 1);
                        AudioEngine.play('hit');
                        createExplosion(enemies[j].x, enemies[j].y, '#ff6b9d', 10);
                        
                        if (enemies[j].health <= 0) {
                            const isBig = enemies[j].type === 'big';
                            gameState.score += isBig ? 50 : 10;
                            createExplosion(enemies[j].x, enemies[j].y, isBig ? '#636e72' : '#ff9ff3', 30);
                            
                            // Chance to drop power-up
                            if (Math.random() < 0.1) {
                                powerUps.push(new PowerUp(enemies[j].x, enemies[j].y));
                            }
                            
                            enemies.splice(j, 1);
                            AudioEngine.play('explosion');
                            updateUI();
                        }
                        break;
                    }
                }
            }

            // Player vs Enemies
            for (let enemy of enemies) {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.width / 2 + enemy.radius) {
                    player.hit();
                    break;
                }
            }

            // Player vs Power-ups
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const dx = player.x - powerUps[i].x;
                const dy = player.y - powerUps[i].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.width / 2 + powerUps[i].radius) {
                    player.powerLevel = Math.min(player.powerLevel + 1, 2);
                    player.powerTimer = 8;
                    AudioEngine.play('powerup');
                    createExplosion(powerUps[i].x, powerUps[i].y, '#ffd93d', 20);
                    
                    const indicator = document.getElementById('powerupIndicator');
                    indicator.textContent = player.powerLevel === 2 ? '🔥 DOUBLE SHOT!' : '✨ SPREAD SHOT!';
                    indicator.classList.add('active');
                    
                    powerUps.splice(i, 1);
                }
            }
        }

        function gameLoop(timestamp) {
            if (!gameState.running) return;

            gameState.deltaTime = Math.min((timestamp - gameState.lastTime) / 1000, 0.1);
            gameState.lastTime = timestamp;

            if (gameState.paused) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            drawBackground();

            // Update & Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(gameState.deltaTime);
                particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Update & Draw power-ups
            for (let i = powerUps.length - 1; i >= 0; i--) {
                powerUps[i].update(gameState.deltaTime);
                powerUps[i].draw(ctx);
                if (powerUps[i].isOffscreen()) powerUps.splice(i, 1);
            }

            // Spawn enemies
            enemySpawnTimer -= gameState.deltaTime;
            if (enemySpawnTimer <= 0) {
                spawnEnemy();
                enemySpawnTimer = 1.5 - Math.min(gameState.wave * 0.05, 1);
            }

            // Update & Draw enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update(gameState.deltaTime);
                enemies[i].draw(ctx);
                if (enemies[i].isOffscreen()) enemies.splice(i, 1);
            }

            // Update & Draw bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update(gameState.deltaTime);
                bullets[i].draw(ctx);
                if (bullets[i].isOffscreen()) bullets.splice(i, 1);
            }

            // Update & Draw player
            player.update(gameState.deltaTime);
            player.draw(ctx);

            // Collisions
            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        // ==================== INPUT HANDLING ====================
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyP') {
                gameState.paused = !gameState.paused;
            }
            if (e.code === 'Space') e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        canvas.addEventListener('mousedown', () => mouseDown = true);
        canvas.addEventListener('mouseup', () => mouseDown = false);
        canvas.addEventListener('mouseleave', () => mouseDown = false);

        // Touch controls
        document.getElementById('moveLeft')?.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys['ArrowLeft'] = true;
        });
        document.getElementById('moveLeft')?.addEventListener('touchend', () => {
            keys['ArrowLeft'] = false;
        });
        document.getElementById('moveRight')?.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys['ArrowRight'] = true;
        });
        document.getElementById('moveRight')?.addEventListener('touchend', () => {
            keys['ArrowRight'] = false;
        });
        document.getElementById('shootBtn')?.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseDown = true;
        });
        document.getElementById('shootBtn')?.addEventListener('touchend', () => {
            mouseDown = false;
        });

        // Buttons
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // ==================== BACKGROUND PARTICLES ====================
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.background = ['#ff6b9d', '#4ecdc4', '#ffd93d', '#c44569'][Math.floor(Math.random() * 4)];
            particlesContainer.appendChild(particle);
        }

        // Init audio on first interaction
        document.addEventListener('click', () => AudioEngine.init(), { once: true });
        document.addEventListener('touchstart', () => AudioEngine.init(), { once: true });
    </script>
</body>
